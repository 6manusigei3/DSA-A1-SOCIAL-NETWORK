<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network</title>

    <!-- LINK TO CSS (IMPORTANT) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Social Network System</h1>

        <p class="message">{{ message }}</p>

        <!-- FORM -->
        <form method="POST" class="form">
            <input type="text" name="user" placeholder="Enter User" required>
            <input type="text" name="friend" placeholder="Enter Friend" required>

            <div class="buttons">
                <button type="submit" name="action" value="add" class="add-btn">➕ Add</button>
                <button type="submit" name="action" value="remove" class="remove-btn">❌ Remove</button>
            </div>
        </form>

        <!-- GRAPH DISPLAY -->
        <h2> Network Graph</h2>

        <div class="graph">
            {% for user, friends in graph.items() %}
                <div class="card">
                    <h3>{{ user }}</h3>
                    <p>{{ friends }}</p>
                </div>
            {% endfor %}
        </div>

    </div>

</body>
</html>
